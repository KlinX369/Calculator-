<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CALCULATOR</title>
  <style>
  body{
    box-sizing: border-box;
  }
    .container{
      max-width: 100%;
      height: 100vh;
      display:flex;
      justify-content :center;
      align-items: center;
    }
    .calculator{
      padding: 20px;
      background: rgba(0,0,0,0.9);
      border-radius: 10px;
    }
    .calculator form .buttons input{
      margin: 10px;
      height: 50px;
      width: 50px;
      border-radius:50%;
      font-size: 1.5rem;
      color: white;
      border:0;
      outline: 0;
      font-weight: bolder;
      box-shadow: -8px -8px 15px rgba(255, 255, 255, 0.15), 5px 5px 15px rgba(0,0,0, 0.3);
      text-align: center;
    }
    .displayer{
      display:flex;
    }
    .buttons{
      justify-content: space-around;
      display: flex;
      background-color: rgba(0,0,0,0.4);
    }
    .buttons input{
      background-color: rgba(0,0,0,0.5);
    }
    .displayer input{
      width: 100%;
      border: none;
      border-radius: 0;
      height: 30px;
      padding-bottom: 30px;
      text-align: right;
      font-size: 1.2rem;
      font-weight: bolder;
      color: black;
      font-weight: 800;
    }
    #special{
      background: navy;
    }
   #special_fxn input{
      width:100%;
      max-height: 50px;
      padding:5px;
      border-radius:10px;
      background:grey;
    }
    
  </style>
</head>

<body>
  <div class="container">
  <div class="calculator">
  <form>
    <h5 style="text-align: center; color: white;">CALCULATOR © 2026 | Powered by Luka</h5>
    <div class="displayer">
      <input type="text" readonly name="display">
    </div>
    <div class="buttons">
       <input type="button" value="C" onclick = "display.value = '' " style="background: red; ">
      <input type="button" value="DEL " onclick = "display.value = display.value.toString().slice(0,-1) " style="background: gold; color: black">
        <input type="button" id="special"  value="π" onclick = "display.value = '3.142' ">
      <input type="button" value="/" onclick = "display.value += '/' " id="special">
    </div>
    <div class="buttons">
      <input type="button" value="7" onclick = "display.value += '7' ">
      <input type="button" value="8" onclick = "display.value += '8' ">
        <input type="button" value="9" onclick = "display.value += '9' ">
      <input type="button" value="*" onclick = "display.value += '*' " id="special">
      
    </div>
    <div class="buttons">
       <input type="button" value="4" onclick = "display.value += '4' ">
      <input type="button" value="5" onclick = "display.value += '5' ">
        <input type="button" value="6" onclick = "display.value += '6' ">
      <input type="button" value="-" onclick = "display.value += '-' " id="special">
    </div>
    <div class="buttons">
       <input type="button" value="1" onclick = "display.value += '1' ">
      <input type="button" value="2" onclick = "display.value += '2' ">
        <input type="button" value="3" onclick = "display.value += '3' ">
      <input type="button" value="+" onclick = "display.value += '+' " id="special">
    </div>
    <div class="buttons">
       <input type="button" value="√" onclick = "display.value = Math.sqrt(display.value).toFixed(4) " style="background: purple  ">
      <input type="button" value="0" onclick = "display.value += '0' ">
        <input type="button" value="." onclick = "display.value += '.' ">
      <input type="button" value="=" onclick = "display.value = eval(display.value) " style="background: green">
    </div>
    <div class="buttons" id="special_fxn">
          <input type="button" onclick="location.href='special_functions.html'" value="Special Functions">
    
    </div>

  </form>
  </div>
  </div>
</body>

</html>
